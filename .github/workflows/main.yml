name: 🚀 Deploy website on push
on:
  push:
  # Botão "Run workflow" no GitHub (aba Actions) para forçar um redeploy
  # sem precisar fazer commit "force redeploy" na mão.
  workflow_dispatch:
  # Redeploy automático: restaura o estado correto do site (incl. /lp)
  # caso a outra empresa sobrescreva. A cada 6 horas.
  # OBS: como usamos dangerousCleanSlate, cada execução reenvia TUDO e
  # apaga arquivos que não fazem parte deste repositório. Se vocês
  # dividirem a mesma pasta com a página de SP, isso pode apagar a página
  # deles e escalar o conflito — nesse caso, aumente o intervalo ou
  # remova o schedule e use só o botão manual acima.
  schedule:
    - cron: '0 */6 * * *'

# Evita que dois deploys rodem ao mesmo tempo (push + agendado) e
# corrompam o servidor no meio do envio.
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: Use Node.js 18
      uses: actions/setup-node@v2
      with:
        node-version: '18'
      
    - name: 🔨 Build Project
      run: |
        npm install
        npm run build
    
    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ./
          passive: true
          dangerousCleanSlate: true
          logLevel: verbose
