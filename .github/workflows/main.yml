name: 🚀 Deploy website on push
on:
  push:
  # Botão "Run workflow" na aba Actions para disparar um deploy manual
  # sem precisar de commit.
  workflow_dispatch:

# Evita que dois deploys rodem ao mesmo tempo e corrompam o servidor
# no meio do envio.
concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: Use Node.js 18
      uses: actions/setup-node@v2
      with:
        node-version: '18'

    - name: 🔨 Build Project
      run: |
        npm install
        npm run build

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ./
          passive: true
          logLevel: verbose
